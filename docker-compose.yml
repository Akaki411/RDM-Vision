services:
  rdm-vision:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "host"
    volumes:
      # Пробрасываем папки с хоста внутрь контейнера
      - ./config:/app/config
      - ./models:/app/models:ro
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"